org.gradle.jvmargs=-Xmx1536M -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Avoid Windows path-root cache issues during Kotlin release compilation.
kotlin.incremental=false
# Low-RAM machine: avoid spinning up multiple concurrent JVM workers/daemons.
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.caching=false
kotlin.compiler.execution.strategy=in-process
